name: Auto-Update Solara Kernel

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly check
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.NEW_VERSION }}
      current_version: ${{ steps.check.outputs.CURRENT_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check kernel versions
        id: check
        run: |
          # Get current version from PKGBUILD
          CURRENT=$(grep -oP 'pkgver=[0-9]+\.[0-9]+' PKGBUILD | cut -d= -f2)
          echo "Current: $CURRENT"
          
          # Check CachyOS packages for latest version
          LATEST=$(curl -s "https://packages.cachyos.org/package/cachyos-v3/x86_64_v3/linux-cachyos" | grep -oP 'Version\s+[0-9]+\.[0-9]+\.[0-9]+' | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "Latest on CachyOS: $LATEST"
          
          echo "NEW_VERSION=$LATEST" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION=$CURRENT" >> $GITHUB_OUTPUT
          
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "Update available: $LATEST vs $CURRENT"
          fi

  update-kernel:
    needs: check-update
    if: needs.check-update.outputs.new_version != ''
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm git base-devel python

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repos
        run: |
          git clone ssh://aur@aur.archlinux.org/solara-kernel.git aur-kernel
          git clone ssh://aur@aur.archlinux.org/solara-kernel-headers.git aur-headers

      - name: Update solara-kernel PKGBUILD
        run: |
          cd aur-kernel
          
          NEW_VER=${{ needs.check-update.outputs.new_version }}
          MAJOR=$(echo "$NEW_VER" | cut -d. -f1,2)
          sed -i "s/^pkgver=.*/pkgver=$MAJOR/" PKGBUILD
          sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD
          
          makepkg --printsrcinfo > .SRCINFO

      - name: Update solara-kernel-headers PKGBUILD
        run: |
          cd aur-headers
          
          NEW_VER=${{ needs.check-update.outputs.new_version }}
          MAJOR=$(echo "$NEW_VER" | cut -d. -f1,2)
          sed -i "s/^pkgver=.*/pkgver=$MAJOR/" PKGBUILD
          sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD
          makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push
        run: |
          cd aur-kernel
          git add -A
          git commit -m "Update to Linux ${{ needs.check-update.outputs.new_version }}"
          git push
          
          cd ../aur-headers
          git add -A
          git commit -m "Update to Linux ${{ needs.check-update.outputs.new_version }}"
          git push

      - name: Create release note
        if: false
        run: |
          echo "Solara Kernel updated to Linux ${{ needs.check-update.outputs.new_version }}"