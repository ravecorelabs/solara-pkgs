name: Build AUR Packages

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/archlinux/archlinux:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: pacman -Sy --noconfirm git base-devel go python-yaml

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build packages
        run: |
          mkdir -p /tmp/pkgout
          python3 build-packages.py

      - name: Create package database
        run: |
          mkdir -p $GITHUB_WORKSPACE/packages/x86_64
          cp /tmp/pkgout/*.pkg.tar.zst $GITHUB_WORKSPACE/packages/x86_64/
          cd $GITHUB_WORKSPACE/packages/x86_64
          repo-add solara-pkgs.db.tar.gz *.pkg.tar.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solara-packages
          path: packages/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solara-packages
          path: packages

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: packages/x86_64/*.pkg.tar.zst
          name: Latest Packages
          body: |
            Auto-built AUR packages for Solara Linux.

            Add to `/etc/pacman.conf`:
            ```
            [solara-pkgs]
            SigLevel = Optional TrustAll
            Server = https://github.com/ravecorelabs/solara-pkgs/releases/download/latest
            ```
          draft: false
          prerelease: false
