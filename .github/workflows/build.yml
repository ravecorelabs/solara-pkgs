name: Build AUR Packages

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages.yaml'
      - 'docs-src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/archlinux/archlinux:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: pacman -Sy --noconfirm git base-devel go python-yaml

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build packages
        run: |
          mkdir -p /tmp/pkgout
          python3 build-packages.py

      - name: Create package database
        run: |
          mkdir -p $GITHUB_WORKSPACE/packages/x86_64
          cp /tmp/pkgout/*.pkg.tar.zst $GITHUB_WORKSPACE/packages/x86_64/
          cd $GITHUB_WORKSPACE/packages/x86_64
          repo-add solara-pkgs.db.tar.gz *.pkg.tar.zst
          ln -sf solara-pkgs.db.tar.gz solara-pkgs.db
          ln -sf solara-pkgs.files.tar.gz solara-pkgs.files

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solara-packages
          path: packages/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solara-packages
          path: packages

      - name: Generate pkglist.json
        run: |
          cd packages/x86_64
          ls *.pkg.tar.zst | python3 -c "import sys,os,json; pkgs=[{'name':f.strip(),'size':os.path.getsize(f.strip())} for f in sys.stdin]; print(json.dumps(pkgs))" > ../../pkglist.json
          cat ../../pkglist.json

      - name: Delete old release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create initial release
        run: |
          gh release create latest --title "Latest Packages" --notes "Auto-built AUR packages for Solara Linux"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          pwd
          ls -la packages/x86_64/
          cd packages/x86_64
          for f in *.pkg.tar.zst; do
            echo "Uploading: $f"
            gh release upload latest "$f" --clobber
          done
          for f in *.db.tar.gz; do
            echo "Uploading: $f"
            gh release upload latest "$f" --clobber
          done
          for f in *.files.tar.gz; do
            echo "Uploading: $f"
            gh release upload latest "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (needs.release.result == 'success' || needs.release.result == 'skipped')
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        run: |
          mkdir -p site/x86_64
          gh release download latest --dir site/x86_64 --pattern "*.pkg.tar.zst" || true
          gh release download latest --dir site/x86_64 --pattern "*.db.tar.gz" || true
          gh release download latest --dir site/x86_64 --pattern "*.files.tar.gz" || true
          cd site/x86_64
          ln -sf solara-pkgs.db.tar.gz solara-pkgs.db || true
          ln -sf solara-pkgs.files.tar.gz solara-pkgs.files || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pkglist.json
        run: |
          cp docs-src/index.html site/index.html
          cd site/x86_64
          ls *.pkg.tar.zst 2>/dev/null | python3 -c "import sys,os,json; pkgs=[{'name':f.strip(),'size':os.path.getsize(f.strip())} for f in sys.stdin if f.strip()]; print(json.dumps(pkgs))" > ../pkglist.json
          cat ../pkglist.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
