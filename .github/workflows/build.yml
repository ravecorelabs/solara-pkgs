name: Build AUR Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialize pacman
        run: |
          pacman-key --init
          pacman-key --populate
          pacman -Sy --noconfirm archlinux-keyring

      - name: Install build tools
        run: |
          pacman -Sy --noconfirm git base-devel

      - name: Read packages to build
        id: packages
        run: |
          PACKAGES=$(cat packages.yaml | grep -E '^\s+-\s+' | sed 's/^\s*-\s*//' | tr '\n' ' ')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Packages to build: $PACKAGES"

      - name: Build each package
        run: |
          PACKAGES="${{ steps.packages.outputs.packages }}"
          for pkg in $PACKAGES; do
            echo "Building $pkg..."
            
            # Clone from AUR to /tmp
            cd /tmp
            git clone https://aur.archlinux.org/$pkg.git
            cd /tmp/$pkg
            
            # Build (--as Root allows running as root in container)
            makepkg -sir --noconfirm --noprogress --asroot
            
            # Debug: show what was built
            ls -la *.pkg.tar.zst 2>/dev/null || echo "No package file found!"
            
            # Move to output
            mkdir -p $GITHUB_WORKSPACE/packages
            cp *.pkg.tar.zst $GITHUB_WORKSPACE/packages/ 2>/dev/null || true
          done
          
          # Debug: show what's in output dir
          ls -la $GITHUB_WORKSPACE/packages/

      - name: Create repo index
        run: |
          cd $GITHUB_WORKSPACE/packages
          # Create package database
          repo-add solara-pkgs.db.tar.gz *.pkg.tar.zst || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solara-packages
          path: |
            packages/*.pkg.tar.zst
            packages/*.db.tar.gz
            packages/*.files.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solara-packages
          path: packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/*.pkg.tar.zst
          name: Latest Packages
          body: |
            Auto-built AUR packages for Solara Linux.
            
            Add to pacman.conf:
            ```
            [solara-pkgs]
            SigLevel = Optional TrustAll
            Server = ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/$arch
            ```
        draft: true
        prerelease: false