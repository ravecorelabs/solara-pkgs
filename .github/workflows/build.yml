name: Build AUR Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/archlinux/archlinux:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          pacman -Sy --noconfirm git base-devel

      - name: Build yay
        run: |
          # Install go (yay dependency) as root
          pacman -S --noconfirm go

          # Create builder user and build
          useradd -m builder
          cd /tmp
          git clone https://aur.archlinux.org/yay.git
          chown -R builder:builder yay
          su - builder -c "cd /tmp/yay && makepkg -s --noconfirm --noprogress"

      - name: Create package database
        run: |
          mkdir -p /github/workspace/packages/x86_64
          cp /tmp/yay/*.pkg.tar.zst /github/workspace/packages/x86_64/
          cd /github/workspace/packages
          repo-add solara-pkgs.db.tar.gz x86_64/*.pkg.tar.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solara-packages
          path: packages/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solara-packages
          path: packages

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/x86_64/*.pkg.tar.zst
          name: Latest Packages
          body: |
            Auto-built AUR packages for Solara Linux.

            Add to `/etc/pacman.conf`:
            ```
            [solara-pkgs]
            SigLevel = Optional TrustAll
            Server = ${{ github.server_url }}/${{ github.repository }}/releases/download/latest/x86_64
            ```
          draft: false
          prerelease: false