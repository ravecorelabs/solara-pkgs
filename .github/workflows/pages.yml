name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release assets
        run: |
          mkdir -p docs/x86_64
          gh release download latest --dir docs/x86_64 --pattern "*.pkg.tar.zst" || true
          gh release download latest --dir docs/x86_64 --pattern "*.db*" || true
          gh release download latest --dir docs/x86_64 --pattern "*.files*" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate package list JSON
        run: |
          cd docs/x86_64
          echo "[" > ../pkglist.json
          first=true
          for f in *.pkg.tar.zst; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ "$first" = true ]; then first=false; else echo "," >> ../pkglist.json; fi
            echo "{\"name\":\"$f\",\"size\":$size}" >> ../pkglist.json
          done
          echo "]" >> ../pkglist.json

      - name: Copy index page
        run: cp docs-src/index.html docs/index.html 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
